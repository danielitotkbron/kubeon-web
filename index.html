<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubeon</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#07070a;
    color:white;
    overflow:hidden;
}

.background{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top,#7e22ce33 0%, transparent 40%),
    radial-gradient(circle at bottom,#581c8733 0%, transparent 40%);
    z-index:-1;
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

.logo{
    width:140px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 20px #9333ea);
}

h1{
    font-size:95px;
    color:#d8b4fe;
    text-shadow:0 0 25px #9333ea;
    letter-spacing:6px;
}

.subtitle{
    font-size:28px;
    color:#d1d5db;
    margin-top:10px;
}

.version{
    margin-top:15px;
    color:#9ca3af;
    font-size:18px;
}

.ip-box{
    margin-top:35px;
    background:#111118;
    border:1px solid #7e22ce;
    border-radius:14px;
    padding:18px 25px;
    display:flex;
    align-items:center;
    gap:20px;
    box-shadow:0 0 20px #581c87aa;
}

.ip{
    font-size:20px;
    color:white;
}

.copy-btn{
    background:#7e22ce;
    border:none;
    padding:12px 22px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.copy-btn:hover{
    background:#9333ea;
    transform:scale(1.05);
}

.buttons{
    margin-top:35px;
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    text-decoration:none;
    padding:14px 30px;
    border-radius:12px;
    background:#111118;
    border:1px solid #7e22ce;
    color:white;
    transition:.3s;
    font-weight:bold;
}

.btn:hover{
    background:#7e22ce;
    transform:translateY(-3px);
    box-shadow:0 0 15px #9333ea;
}

.copy-message{
    margin-top:15px;
    color:#a78bfa;
    font-size:14px;
}

@media(max-width:700px){

    h1{
        font-size:60px;
    }

    .subtitle{
        font-size:22px;
    }

    .ip-box{
        flex-direction:column;
    }

}

</style>
</head>
<body>

<div class="background"></div>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <h1>KUBEON</h1>

    <div class="subtitle">
        Tu Aventura Empieza Ahora
    </div>

    <div class="version">
        Minecraft Java 1.12+ - Última
    </div>

    <div class="ip-box">

        <div class="ip">
            play.kubeon.xyz
        </div>

        <button class="copy-btn" onclick="copyIP()">
            Copiar IP
        </button>

    </div>

    <div class="copy-message" id="copyText">
        Haz click para copiar la IP
    </div>

    <div class="buttons">

        <a class="btn"
        href="https://discord.gg/yBwJqHF2xk"
        target="_blank">
            Discord
        </a>

        <a class="btn"
        href="#">
            Tienda
        </a>

        <a class="btn"
        href="#">
            Wiki
        </a>

    </div>

</div>

<script>

function copyIP(){

    navigator.clipboard.writeText("play.kubeon.xyz");

    document.getElementById("copyText").innerText =
    "IP copiada correctamente";

}

</script>

</body>
</html>
