<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubeon - Servidor de Minecraft</title>
    
    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: #090b11;
            color: white;
            overflow: hidden; /* Evita scroll innecesario */
            height: 100vh;
            width: 100vw;
        }

        /* FONDO DINÁMICO */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: .15;
            animation: float 8s ease-in-out infinite;
        }

        .glow1 { background: #7e22ce; top: -250px; left: -200px; }
        .glow2 { background: #581c87; bottom: -250px; right: -200px; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(25px) scale(1.08); }
        }

        /* ANIMACIÓN DE RESPIRACIÓN (LOGO) */
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(147,51,234,.3)); }
            50% { transform: scale(1.06); filter: drop-shadow(0 0 35px rgba(168,85,247,.5)); }
        }

        /* CONTENEDOR PRINCIPAL - POSICIÓN MÁS ALTA */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            transform: translateY(-80px); /* Ajuste para subir todo el contenido */
        }

        /* LOGO AGRANDADO */
        .logo {
            width: 480px;
            max-width: 90vw;
            height: auto;
            margin-bottom: 20px;
            animation: breathe 4s ease-in-out infinite;
            pointer-events: none; /* Para que no interfiera con clicks */
        }

        /* TEXTOS */
        .subtitle {
            font-size: 24px;
            font-weight: 600;
            color: #f5f5f5;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .version {
            color: #9ca3af;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 30px;
        }

        /* CAJA IP */
        .ip-box {
            background: rgba(18,18,25,.92);
            border: 1px solid rgba(168,85,247,.4);
            border-radius: 20px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            transition: all .3s ease;
        }

        .ip-box:hover {
            border-color: #a855f7;
            transform: scale(1.02);
        }

        .ip {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
        }

        .copy-btn {
            background: #7e22ce;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all .25s ease;
        }

        .copy-btn:hover {
            background: #9333ea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(147,51,234,0.4);
        }

        /* BOTONES DE ENLACE */
        .buttons {
            margin-top: 40px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 20px 50px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(168,85,247,.3);
            color: white;
            font-size: 20px;
            font-weight: 700;
            min-width: 220px;
            transition: all .3s ease;
        }

        .btn:hover {
            background: #7e22ce;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(147,51,234,0.3);
        }

        /* RESPONSIVE */
        @media(max-width: 768px){
            .logo { width: 320px; }
            .container { transform: translateY(-30px); }
            .ip-box { flex-direction: column; width: 100%; }
            .ip { font-size: 20px; }
            .btn { width: 100%; min-width: unset; }
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="glow glow1"></div>
        <div class="glow glow2"></div>
    </div>

    <div class="container">
        <!-- Logo con animación de respiración -->
        <img src="logo.png" class="logo" alt="Logo Kubeon">

        <!-- Textos movidos hacia arriba junto con la IP -->
        <div class="subtitle">Tu Aventura Empieza Ahora</div>
        <div class="version">Minecraft Java 1.12+ • Última Versión</div>

        <!-- Caja de IP -->
        <div class="ip-box">
            <div class="ip" id="server-ip">play.kubeon.xyz</div>
            <button class="copy-btn" onclick="copyIP()">Copiar IP</button>
        </div>

        <!-- Botones inferiores -->
        <div class="buttons">
            <a class="btn" href="https://discord.gg/yBwJqHF2xk" target="_blank">Discord</a>
            <a class="btn" href="#">Tienda</a>
            <a class="btn" href="#">Wiki</a>
        </div>
    </div>

    <script>
        function copyIP() {
            const ipText = "play.kubeon.xyz";
            const btn = document.querySelector(".copy-btn");

            // Método moderno
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(ipText).then(() => {
                    updateButton();
                });
            } else {
                // Método de respaldo para navegadores antiguos o sin HTTPS
                const textArea = document.createElement("textarea");
                textArea.value = ipText;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    updateButton();
                } catch (err) {
                    console.error('Error al copiar', err);
                }
                document.body.removeChild(textArea);
            }

            function updateButton() {
                btn.innerText = "¡Copiado!";
                btn.style.background = "#22c55e"; // Color verde de éxito
                setTimeout(() => {
                    btn.innerText = "Copiar IP";
                    btn.style.background = "#7e22ce";
                }, 2000);
            }
        }
    </script>

</body>
</html>
