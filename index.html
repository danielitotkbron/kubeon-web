<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubeon Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: #090b11;
            color: white;
            overflow: hidden;
        }

        /* FONDO (Tus luces originales) */
        .background {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: .15;
            animation: float 8s ease-in-out infinite;
        }

        .glow1 { background: #7e22ce; top: -250px; left: -200px; }
        .glow2 { background: #581c87; bottom: -250px; right: -200px; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(25px) scale(1.08); }
        }

        /* ANIMACIÓN DE RESPIRACIÓN */
        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(147,51,234,.35)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 35px rgba(168,85,247,.55)); }
        }

        /* CONTENIDO - Ahora más arriba */
        .container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            transform: translateY(-80px); /* Subimos todo el bloque */
        }

        /* LOGO - Mucho más grande y con respiración */
        .logo {
            width: 450px; 
            max-width: 90vw;
            margin-bottom: 20px;
            animation: breathe 4s ease-in-out infinite;
        }

        /* TEXTOS */
        .subtitle {
            margin-top: 10px;
            font-size: 22px;
            font-weight: 700;
            color: #f3e8ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(168,85,247,0.5);
        }

        .version {
            margin-top: 5px;
            color: #9ca3af;
            font-size: 17px;
            font-weight: 500;
        }

        /* CAJA IP */
        .ip-box {
            margin-top: 30px;
            background: rgba(18,18,25,.92);
            border: 1px solid rgba(168,85,247,.4);
            border-radius: 20px;
            padding: 18px 26px;
            display: flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(126,34,206,.18);
            transition: all .25s ease;
        }

        .ip-box:hover {
            transform: scale(1.02);
            border-color: #a855f7;
        }

        .ip {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: .5px;
        }

        .copy-btn {
            background: #7e22ce;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all .25s ease;
        }

        .copy-btn:hover {
            background: #9333ea;
            transform: translateY(-2px);
        }

        /* BOTONES */
        .buttons {
            margin-top: 35px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 15px;
            background: rgba(18,18,25,.92);
            border: 1px solid rgba(168,85,247,.38);
            color: white;
            font-size: 18px;
            font-weight: 700;
            min-width: 200px;
            transition: all .25s ease;
        }

        .btn:hover {
            transform: translateY(-4px);
            background: #7e22ce;
            box-shadow: 0 10px 25px rgba(147,51,234,.3);
        }

        /* RESPONSIVE */
        @media(max-width:768px){
            .logo { width: 300px; }
            .container { transform: translateY(-40px); }
            .ip-box { flex-direction: column; padding: 20px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="glow glow1"></div>
        <div class="glow glow2"></div>
    </div>

    <div class="container">
        <img src="logo.png" class="logo">

        <div class="subtitle">Tu Aventura Empieza Ahora</div>
        <div class="version">Minecraft Java 1.12+ • Última Versión</div>

        <div class="ip-box">
            <div class="ip">play.kubeon.xyz</div>
            <button class="copy-btn" onclick="copyIP()">Copiar IP</button>
        </div>

        <div class="buttons">
            <a class="btn" href="https://discord.gg/yBwJqHF2xk" target="_blank">Discord</a>
            <a class="btn" href="#">Tienda</a>
            <a class="btn" href="#">Wiki</a>
        </div>
    </div>

    <script>
        async function copyIP(){
            const btn = document.querySelector(".copy-btn");
            const text = "play.kubeon.xyz";
            try {
                await navigator.clipboard.writeText(text);
                btn.innerText = "¡Copiado!";
                setTimeout(() => { btn.innerText = "Copiar IP"; }, 3000);
            } catch(err) {
                // Fallback por si falla el clipboard
                const input = document.createElement("input");
                document.body.appendChild(input);
                input.value = text;
                input.select();
                document.execCommand("copy");
                document.body.removeChild(input);
                btn.innerText = "¡Copiado!";
                setTimeout(() => { btn.innerText = "Copiar IP"; }, 3000);
            }
        }
    </script>
</body>
</html>
