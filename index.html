<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kubeon</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Montserrat', sans-serif;
}

body{
    background:#090b11;
    color:white;
    overflow:hidden;
}

/* FONDO */
.background{
    position:absolute;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
}

.glow{
    position:absolute;
    width:700px;
    height:700px;
    border-radius:50%;
    filter:blur(150px);
    opacity:.15;
    animation:float 8s ease-in-out infinite;
}

.glow1{
    background:#7e22ce;
    top:-250px;
    left:-200px;
}

.glow2{
    background:#581c87;
    bottom:-250px;
    right:-200px;
    animation-delay:4s;
}

@keyframes float{
    0%{transform:translateY(0px) scale(1);}
    50%{transform:translateY(25px) scale(1.08);}
    100%{transform:translateY(0px) scale(1);}
}

/* CONTENIDO (SUBIDO) */
.container{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
    transform:translateY(-85px); /* 👈 más arriba */

}

/* LOGO CON RESPIRACIÓN */
.logo{

    width:460px; /* 👈 tamaño más grande */

    margin-bottom:8px;

    filter:drop-shadow(0 0 25px rgba(147,51,234,.35));

    animation:breath 4s ease-in-out infinite;

}

@keyframes breath{

    0%{
        transform:scale(1);
        filter:drop-shadow(0 0 18px rgba(147,51,234,.25));
    }

    50%{
        transform:scale(1.06);
        filter:drop-shadow(0 0 40px rgba(168,85,247,.6));
    }

    100%{
        transform:scale(1);
        filter:drop-shadow(0 0 18px rgba(147,51,234,.25));
    }

}

/* SUBTITULO */
.subtitle{
    margin-top:12px;
    font-size:20px;
    font-weight:600;
    color:#f5f5f5;
    opacity:.9;
}

/* VERSION */
.version{
    margin-top:8px;
    color:#9ca3af;
    font-size:17px;
    font-weight:500;
}

/* IP BOX */
.ip-box{

    margin-top:28px;

    background:rgba(18,18,25,.92);
    border:1px solid rgba(168,85,247,.4);
    border-radius:20px;
    padding:22px 26px;
    display:flex;
    align-items:center;
    gap:22px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(126,34,206,.18);

}

/* IP */
.ip{
    font-size:30px;
    font-weight:700;
}

/* BOTÓN COPIAR */
.copy-btn{

    background:#7e22ce;
    border:none;
    padding:18px 34px;
    border-radius:15px;
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;

}

/* BOTONES (NO TOCAR) */
.buttons{
    margin-top:28px;
    display:flex;
    gap:24px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{

    text-decoration:none;
    padding:34px 75px;
    border-radius:22px;
    background:rgba(18,18,25,.92);
    border:1px solid rgba(168,85,247,.38);
    color:white;
    font-size:25px;
    font-weight:700;
    min-width:280px;

}

.btn:hover{
    transform:translateY(-4px) scale(1.05);
    background:#7e22ce;
}

/* RESPONSIVE */
@media(max-width:900px){

    .logo{ width:320px; }

    .ip-box{ flex-direction:column; }

    .ip{ font-size:24px; }

    .container{ transform:translateY(-50px); }

}

</style>
</head>

<body>

<!-- FONDO -->
<div class="background">
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
</div>

<!-- CONTENIDO -->
<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <!-- SUBTITULO -->
    <div class="subtitle">
        Tu Aventura Empieza Ahora
    </div>

    <!-- VERSION -->
    <div class="version">
        Minecraft Java 1.12+ • Última Versión
    </div>

    <!-- IP -->
    <div class="ip-box">

        <div class="ip">play.kubeon.xyz</div>

        <button class="copy-btn" onclick="copyIP()">
            Copiar IP
        </button>

    </div>

    <!-- BOTONES -->
    <div class="buttons">

        <a class="btn" href="https://discord.gg/yBwJqHF2xk" target="_blank">Discord</a>
        <a class="btn" href="#">Tienda</a>
        <a class="btn" href="#">Wiki</a>

    </div>

</div>

<script>

async function copyIP(){

    const btn = document.querySelector(".copy-btn");

    try{

        await navigator.clipboard.writeText("play.kubeon.xyz");

        btn.innerText = "¡Copiado!";

        setTimeout(()=> btn.innerText = "Copiar IP", 3000);

    }catch(err){

        const input = document.createElement("input");
        document.body.appendChild(input);
        input.value = "play.kubeon.xyz";
        input.select();
        document.execCommand("copy");
        document.body.removeChild(input);

        btn.innerText = "¡Copiado!";
        setTimeout(()=> btn.innerText = "Copiar IP", 3000);
    }
}

</script>

</body>
</html>
