<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubeon</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#111217;
    color:white;
    overflow:hidden;
}

/* FONDO ANIMADO */
.background{
    position:absolute;
    width:100%;
    height:100%;
    z-index:-1;
}

.glow{
    position:absolute;
    width:600px;
    height:600px;
    background:#7e22ce;
    border-radius:50%;
    filter:blur(140px);
    opacity:.22;
    animation:float 6s ease-in-out infinite;
}

.glow1{
    top:-150px;
    left:-100px;
}

.glow2{
    bottom:-150px;
    right:-100px;
    animation-delay:3s;
}

@keyframes float{
    0%{transform:scale(1) translateY(0px);}
    50%{transform:scale(1.1) translateY(20px);}
    100%{transform:scale(1) translateY(0px);}
}

.container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:20px;
}

/* LOGO */
.logo{
    width:320px;
    margin-bottom:20px;
    filter:drop-shadow(0 0 25px #9333ea);
}

/* TITULO */
h1{
    font-size:140px;
    color:#e9d5ff;
    text-shadow:0 0 30px #9333ea;
    letter-spacing:6px;
}

/* SUBTITULO */
.subtitle{
    font-size:30px;
    color:#d1d5db;
    margin-top:10px;
}

/* VERSION */
.version{
    margin-top:18px;
    color:#9ca3af;
    font-size:20px;
}

/* IP BOX */
.ip-box{
    margin-top:35px;
    background:#1a1b22;
    border:1px solid #7e22ce;
    border-radius:18px;
    padding:28px 40px;
    display:flex;
    align-items:center;
    gap:25px;
    box-shadow:0 0 25px #581c8799;
}

/* IP TEXTO */
.ip{
    font-size:30px;
}

/* BOTON COPIAR */
.copy-btn{
    background:#7e22ce;
    border:none;
    padding:20px 38px;
    border-radius:14px;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.copy-btn:hover{
    background:#9333ea;
    transform:scale(1.06);
    box-shadow:0 0 20px #9333ea;
}

/* BOTONES */
.buttons{
    margin-top:40px;
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    text-decoration:none;
    padding:22px 55px;
    border-radius:16px;
    background:#1a1b22;
    border:1px solid #7e22ce;
    color:white;
    transition:.3s;
    font-weight:bold;
    font-size:22px;
    min-width:240px;
}

.btn:hover{
    background:#7e22ce;
    transform:translateY(-4px);
    box-shadow:0 0 20px #9333ea;
}

</style>
</head>
<body>

<div class="background">
    <div class="glow glow1"></div>
    <div class="glow glow2"></div>
</div>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <!-- TITULO -->
    <h1>KUBEON</h1>

    <div class="subtitle">
        Tu Aventura Empieza Ahora
    </div>

    <div class="version">
        Minecraft Java 1.12+ - Última
    </div>

    <!-- IP -->
    <div class="ip-box">

        <div class="ip">
            play.kubeon.xyz
        </div>

        <button class="copy-btn" onclick="copyIP()">
            Copiar IP
        </button>

    </div>

    <!-- BOTONES -->
    <div class="buttons">

        <a class="btn" href="https://discord.gg/yBwJqHF2xk" target="_blank">
            Discord
        </a>

        <a class="btn" href="#">
            Tienda
        </a>

        <a class="btn" href="#">
            Wiki
        </a>

    </div>

</div>

<script>

function copyIP(){

    const btn = document.querySelector(".copy-btn");

    navigator.clipboard.writeText("play.kubeon.xyz");

    btn.innerText = "¡Copiado!";

    setTimeout(() => {
        btn.innerText = "Copiar IP";
    }, 3000);

}

</script>

</body>
</html>
